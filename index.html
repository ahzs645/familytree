<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="CloudTreeWeb — your MacFamilyTree data, in the browser" />
    <link rel="apple-touch-icon" href="cloudtreeweb_webapp_icon.png" />
    <link rel="manifest" href="manifest.json" />
    <title>CloudTreeWeb</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('cloudtreeweb:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
