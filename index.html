<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="CloudTreeWeb — your MacFamilyTree data, in the browser" />
    <link rel="apple-touch-icon" href="cloudtreeweb_webapp_icon.png" />
    <link rel="manifest" href="manifest.json" />
    <title>CloudTreeWeb</title>
    <script>
      // Unwrap the GitHub Pages SPA redirect from public/404.html
      // (`/familytree/?p=/view/abc&foo=1` → `/familytree/view/abc?foo=1`)
      // so BrowserRouter sees the real path on the first render.
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var p = params.get('p');
          if (!p) return;
          params.delete('p');
          var basePath = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
          var route = p.replace(/^\/+/, '');
          var rest = params.toString();
          var next = basePath + '/' + route + (rest ? '?' + rest : '') + window.location.hash;
          window.history.replaceState(null, '', next);
        } catch (e) {}
      })();
      (function () {
        try {
          var localization = {};
          try {
            localization = JSON.parse(localStorage.getItem('cloudtreeweb:localization') || 'null') || {};
          } catch (e) {}
          if (localization.locale) document.documentElement.lang = localization.locale;
          var direction = localization.direction;
          if (!direction || direction === 'auto') {
            var language = String(localization.locale || document.documentElement.lang || 'en').toLowerCase().split('-')[0];
            direction = /^(ar|arc|ckb|dv|fa|he|ku|ps|syr|ur|yi)$/.test(language) ? 'rtl' : 'ltr';
          }
          document.documentElement.dir = direction;
          var saved = localStorage.getItem('cloudtreeweb:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
