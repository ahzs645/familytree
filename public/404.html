<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CloudTreeWeb</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts /familytree/editperson?zone=... to /familytree/?p=/editperson&zone=...
      var path = window.location.pathname;
      var base = '/familytree/';
      if (path.startsWith(base)) {
        var route = path.slice(base.length);
        if (route && route !== 'index.html') {
          var search = window.location.search || '';
          window.location.replace(base + '?p=/' + route + (search ? '&' + search.slice(1) : ''));
        }
      }
    </script>
  </head>
  <body></body>
</html>
