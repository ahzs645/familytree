name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy sql.js WASM to public
        run: |
          cp node_modules/sql.js/dist/sql-wasm.js public/
          cp node_modules/sql.js/dist/sql-wasm.wasm public/

      # App tests only. The vendored json-url submodule ships its own suite
      # (one codec-preference test currently fails upstream); it shouldn't
      # gate app changes here.
      - name: Run tests
        run: npx vitest run src

      - name: Build
        run: npx vite build --base=/familytree/
        env:
          VITE_ENABLE_REMOTE_IMPORT: 'true'
